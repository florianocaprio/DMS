    User:
      type: object
      required:
        - id
        - email
        - name
        - role
        - isActive
        - createdAt
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
        area:
          type: ["string", "null"]
        section:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        isActive:
          type: boolean
        lastLoginAt:
          type: ["string", "null"]
        createdAt:
          type: string

    UserInput:
      type: object
      required:
        - email
        - name
        - role
      properties:
        email:
          type: string
        name:
          type: string
        role:
          type: string
        area:
          type: string
        section:
          type: string
        avatarUrl:
          type: string

    UserUpdate:
      type: object
      properties:
