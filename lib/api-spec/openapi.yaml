    # --- WORKFLOWS ---
    Workflow:
      type: object
      required:
        - id
        - name
        - steps
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        documentType:
          type: ["string", "null"]
        steps:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowStep"
