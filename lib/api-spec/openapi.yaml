        appliesTo:
          type: string
        config:
          type: object
          additionalProperties: true
        isActive:
          type: boolean

    DossierWorkflowRuleUpdate:
      type: object
      properties:
        name:
          type: string
        appliesTo:
          type: string
        config:
          type: object
          additionalProperties: true
        isActive:
          type: boolean

    DossierWorkflowInstance:
      type: object
      required:
        - id
        - ruleId
        - ruleName
        - dossierId
        - type
        - targetType
        - targetId
        - status
        - participants
        - createdAt
      properties:
        id:
          type: integer
        ruleId:
          type: integer
        ruleName:
          type: string
        dossierId:
          type: integer
        type:
          type: string
        targetType:
          type: string
        targetId:
          type: integer
        targetTitle:
          type: ["string", "null"]
        status:
          type: string
        signatureRequestId:
          type: ["integer", "null"]
        participants:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowInstanceParticipant"
        note:
          type: ["string", "null"]
        createdAt:
          type: string
        resolvedAt:
          type: ["string", "null"]

    WorkflowInstanceParticipant:
      type: object
      required:
        - userId
        - userName
        - status
      properties:
        userId:
          type: integer
        userName:
          type: string
        status:
          type: string
        actedAt:
          type: ["string", "null"]
        note:
          type: ["string", "null"]

    WorkflowInstanceAction:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          description: approve | reject | acknowledge
        note:
          type: string

    # --- SIGNATURES ---
    SignatureRequest:
      type: object
      required:
        - id
        - documentId
        - status
        - signatories
        - createdAt
      properties:
        id:
          type: integer
        documentId:
          type: integer
        documentTitle:
          type: ["string", "null"]
        status:
          type: string
        type:
          type: string
          default: internal
        signatories:
          type: array
          items:
            $ref: "#/components/schemas/Signatory"
        requestedById:
          type: integer
        requestedByName:
          type: string
        note:
          type: ["string", "null"]
        createdAt:
          type: string
        completedAt:
          type: ["string", "null"]
        expiresAt:
          type: ["string", "null"]

    Signatory:
      type: object
      required:
        - userId
        - userName
        - order
        - status
      properties:
        userId:
          type: integer
        userName:
          type: string
        order:
          type: integer
        status:
          type: string
        signedAt:
          type: ["string", "null"]
        note:
          type: ["string", "null"]

    SignatureRequestInput:
      type: object
      required:
        - documentId
        - signatories
      properties:
        documentId:
          type: integer
        type:
          type: string
          default: internal
        signatories:
          type: array
          items:
            type: object
            required:
              - userId
              - order
            properties:
              userId:
                type: integer
              order:
                type: integer
        note:
          type: string
        expiresAt:
          type: string

    SignatureAction:
      type: object
      required:
        - action
      properties:
        action:
          type: string
        note:
          type: string

