        - workflowName
        - currentStep
        - status
        - startedAt
      properties:
        id:
          type: integer
        documentId:
          type: integer
        documentTitle:
          type: ["string", "null"]
        workflowId:
          type: integer
        workflowName:
          type: string
        currentStep:
          type: integer
        totalSteps:
          type: integer
        status:
          type: string
        startedAt:
          type: string
        completedAt:
          type: ["string", "null"]
        currentStepName:
          type: ["string", "null"]
        currentStepAction:
          type: ["string", "null"]
        currentAssigneeId:
          type: ["integer", "null"]
        currentAssigneeName:
          type: ["string", "null"]

    StartWorkflowInput:
      type: object
      required:
        - documentId
        - workflowId
      properties:
        documentId:
          type: integer
        workflowId:
          type: integer
        note:
          type: string

    WorkflowStepOutcome:
      type: object
      required:
        - outcome
      properties:
        outcome:
          type: string
        note:
          type: string
        delegateToId:
          type: ["integer", "null"]

    # --- DOSSIER WORKFLOWS ---
    DossierWorkflowRule:
      type: object
      required:
        - id
        - dossierId
        - type
        - name
        - appliesTo
        - isActive
        - createdAt
      properties:
        id:
          type: integer
        dossierId:
          type: integer
        type:
          type: string
          description: cc | approval | signature | move | copy
        name:
          type: string
        appliesTo:
          type: string
          description: documents | protocols | both
        config:
          type: object
          additionalProperties: true
          description: >-
            Type-specific config. cc { userIds, notifyEmails }, approval {
            approverId, notifyEmails }, signature { signatoryIds, requireAll,
            notifyEmails }, move|copy { targetDossierId }.
        participantNames:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        createdAt:
          type: string

