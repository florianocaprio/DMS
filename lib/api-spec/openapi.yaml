openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DMS - Document Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Document management
  - name: protocols
    description: Protocol register
  - name: dossiers
    description: Dossiers and fascicles
  - name: tasks
    description: Task management
  - name: workflows
    description: Workflow management
  - name: signatures
    description: Document signing
  - name: users
    description: User management
  - name: classifications
    description: Classification and titolario
  - name: dashboard
    description: Dashboard and statistics
  - name: search
    description: Document search
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- STORAGE ---
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an uploaded object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # --- ATTACHMENTS ---
  /attachments:
    get:
      tags: [Storage]
      operationId: listAttachments
      summary: List file attachments
      parameters:
        - name: documentId
          in: query
          schema:
            type: integer
        - name: protocolId
          in: query
          schema:
            type: integer
        - name: dossierId
          in: query
          schema:
            type: integer
        - name: includeRemoved
          in: query
          description: Include soft-deleted (removed) attachments in the result
          schema:
            type: ["boolean", "null"]
      responses:
        '200':
          description: List of attachments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileAttachment'
    post:
      tags: [Storage]
      operationId: createAttachment
      summary: Save an attachment record after upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttachmentInput'
      responses:
        '201':
          description: Attachment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileAttachment'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /attachments/{id}:
    delete:
      tags: [Storage]
      operationId: deleteAttachment
      summary: Delete an attachment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted.
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # --- DASHBOARD ---
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/my-items:
    get:
      operationId: getMyDashboardItems
      tags: [dashboard]
      summary: Get personal dashboard items
      responses:
        "200":
          description: Personal dashboard items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyDashboardItems"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # --- DOCUMENTS ---
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: dossierId
          in: query
          schema:
            type: ["integer", "null"]
        - name: dossierIds
          in: query
          description: Comma-separated list of dossier ids to filter by
          schema:
            type: ["string", "null"]
        - name: assignedToMe
          in: query
          schema:
            type: ["boolean", "null"]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentList"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a new document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get document by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUpdate"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Archive/delete document (logical)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /documents/{id}/status:
    patch:
      operationId: updateDocumentStatus
      tags: [documents]
      summary: Update document status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentStatusUpdate"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}/versions:
    get:
      operationId: getDocumentVersions
      tags: [documents]
      summary: Get document version history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentVersion"

  /documents/{id}/assignments:
    post:
      operationId: assignDocument
      tags: [documents]
      summary: Assign document to users
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignmentInput"
      responses:
        "200":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  # --- PROTOCOLS ---
  /protocols:
    get:
      operationId: listProtocols
      tags: [protocols]
      summary: List protocols
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: year
          in: query
          schema:
            type: ["integer", "null"]
        - name: dossierId
          in: query
          schema:
            type: ["integer", "null"]
        - name: assignedToMe
          in: query
          schema:
            type: ["boolean", "null"]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Protocol list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtocolList"
    post:
      operationId: createProtocol
      tags: [protocols]
      summary: Create and register a new protocol
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProtocolInput"
      responses:
        "201":
          description: Created protocol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Protocol"

  /protocols/{id}:
    get:
      operationId: getProtocol
      tags: [protocols]
      summary: Get protocol by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Protocol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Protocol"
        "404":
          description: Not found
    patch:
      operationId: updateProtocol
      tags: [protocols]
      summary: Update protocol metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProtocolUpdate"
      responses:
        "200":
          description: Updated protocol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Protocol"

  /protocols/{id}/cancel:
    post:
      operationId: cancelProtocol
      tags: [protocols]
      summary: Cancel (annul) a protocol
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelProtocolInput"
      responses:
        "200":
          description: Cancelled protocol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Protocol"

  /protocols/{id}/dossiers:
    get:
      operationId: listProtocolDossiers
      tags: [protocols]
      summary: List the dossiers a protocol is filed in
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dossier memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProtocolDossierMembership"
    post:
      operationId: addProtocolDossier
      tags: [protocols]
      summary: File a protocol into an additional dossier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProtocolDossierInput"
      responses:
        "201":
          description: Membership created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Not found

  /protocols/{id}/dossiers/{dossierId}:
    delete:
      operationId: removeProtocolDossier
      tags: [protocols]
      summary: Remove a protocol from a dossier (the protocol itself is preserved)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: dossierId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed
        "404":
          description: Not found

  /protocols/summary:
    get:
      operationId: getProtocolSummary
      tags: [protocols]
      summary: Get protocol counts grouped by type and status
      responses:
        "200":
          description: Protocol summary counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtocolSummary"

  # --- DOSSIERS ---
  /dossiers:
    get:
      operationId: listDossiers
      tags: [dossiers]
      summary: List dossiers
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: responsibleId
          in: query
          schema:
            type: ["integer", "null"]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Dossier list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DossierList"
    post:
      operationId: createDossier
      tags: [dossiers]
      summary: Create a new dossier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DossierInput"
      responses:
        "201":
          description: Created dossier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dossier"

  /dossiers/{id}:
    get:
      operationId: getDossier
      tags: [dossiers]
      summary: Get dossier by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dossier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dossier"
    patch:
      operationId: updateDossier
      tags: [dossiers]
      summary: Update dossier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DossierUpdate"
      responses:
        "200":
          description: Updated dossier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dossier"

  /dossiers/{id}/documents:
    get:
      operationId: getDossierDocuments
      tags: [dossiers]
      summary: List documents in a dossier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Documents in dossier
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /dossiers/{id}/protocols:
    get:
      operationId: getDossierProtocols
      tags: [dossiers]
      summary: List protocols in a dossier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Protocols in dossier
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Protocol"

  /dossiers/{id}/children:
    get:
      operationId: getDossierChildren
      tags: [dossiers]
      summary: List sub-dossiers (sotto-fascicoli) of a dossier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sub-dossiers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dossier"

  # --- DOSSIER WORKFLOWS ---
  /dossiers/{id}/workflow-rules:
    get:
      operationId: listDossierWorkflowRules
      tags: [dossierWorkflows]
      summary: List workflow rules attached to a dossier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workflow rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DossierWorkflowRule"
    post:
      operationId: createDossierWorkflowRule
      tags: [dossierWorkflows]
      summary: Attach a workflow rule to a dossier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DossierWorkflowRuleInput"
      responses:
        "201":
          description: Created rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DossierWorkflowRule"

  /workflow-rules/{id}:
    patch:
      operationId: updateDossierWorkflowRule
      tags: [dossierWorkflows]
      summary: Update a dossier workflow rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DossierWorkflowRuleUpdate"
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DossierWorkflowRule"
    delete:
      operationId: deleteDossierWorkflowRule
      tags: [dossierWorkflows]
      summary: Delete a dossier workflow rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dossiers/{id}/workflow-instances:
    get:
      operationId: listDossierWorkflowInstances
      tags: [dossierWorkflows]
      summary: List workflow instances triggered within a dossier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workflow instances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DossierWorkflowInstance"

  /workflow-instances:
    get:
      operationId: listWorkflowInstances
      tags: [dossierWorkflows]
      summary: List dossier workflow instances (optionally pending for current user)
      parameters:
        - name: pendingForMe
          in: query
          schema:
            type: ["boolean", "null"]
      responses:
        "200":
          description: Workflow instances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DossierWorkflowInstance"

  /workflow-instances/{id}/act:
    post:
      operationId: actOnWorkflowInstance
      tags: [dossierWorkflows]
      summary: Approve, reject or acknowledge a workflow instance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowInstanceAction"
      responses:
        "200":
          description: Updated instance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DossierWorkflowInstance"

  # --- TASKS ---
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: assignedToMe
          in: query
          schema:
            type: ["boolean", "null"]
        - name: protocolId
          in: query
          schema:
            type: ["integer", "null"]
        - name: dossierId
          in: query
          schema:
            type: ["integer", "null"]
        - name: priority
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskList"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks/overdue:
    get:
      operationId: getOverdueTasks
      tags: [tasks]
      summary: Get overdue tasks
      responses:
        "200":
          description: Overdue tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  # --- WORKFLOWS ---
  /workflows:
    get:
      operationId: listWorkflows
      tags: [workflows]
      summary: List workflow definitions
      responses:
        "200":
          description: Workflows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workflow"
    post:
      operationId: createWorkflow
      tags: [workflows]
      summary: Create a workflow definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowInput"
      responses:
        "201":
          description: Created workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"

  /workflows/{id}:
    get:
      operationId: getWorkflow
      tags: [workflows]
      summary: Get workflow definition
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"

  /document-workflows:
    get:
      operationId: listDocumentWorkflows
      tags: [workflows]
      summary: List active document workflow instances
      parameters:
        - name: documentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Active workflows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentWorkflow"
    post:
      operationId: startDocumentWorkflow
      tags: [workflows]
      summary: Start a workflow on a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartWorkflowInput"
      responses:
        "201":
          description: Started workflow instance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentWorkflow"

  /document-workflows/{id}/advance:
    post:
      operationId: advanceWorkflowStep
      tags: [workflows]
      summary: Advance or reject a workflow step
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowStepOutcome"
      responses:
        "200":
          description: Updated workflow instance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentWorkflow"

  # --- SIGNATURES ---
  /signatures:
    get:
      operationId: listSignatures
      tags: [signatures]
      summary: List signature requests
      parameters:
        - name: documentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: string
        - name: pendingForMe
          in: query
          schema:
            type: ["boolean", "null"]
      responses:
        "200":
          description: Signature requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SignatureRequest"
    post:
      operationId: createSignatureRequest
      tags: [signatures]
      summary: Request signatures on a document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignatureRequestInput"
      responses:
        "201":
          description: Created signature request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignatureRequest"

  /signatures/{id}/sign:
    post:
      operationId: signDocument
      tags: [signatures]
      summary: Sign or reject a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignatureAction"
      responses:
        "200":
          description: Updated signature request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignatureRequest"

  # --- USERS ---
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: active
          in: query
          schema:
            type: ["boolean", "null"]
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # --- CLASSIFICATIONS ---
  /classifications:
    get:
      operationId: listClassifications
      tags: [classifications]
      summary: List titolario classifications
      responses:
        "200":
          description: Classifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Classification"
    post:
      operationId: createClassification
      tags: [classifications]
      summary: Create classification entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassificationInput"
      responses:
        "201":
          description: Created classification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Classification"

  # --- SEARCH ---
  /search:
    get:
      operationId: searchDocuments
      tags: [search]
      summary: Full-text search across documents and protocols
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: ["string", "null"]
        - name: dateTo
          in: query
          schema:
            type: ["string", "null"]
        - name: protocolType
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

