kind = "web"
previewPath = "/"
title = "DMS - Document Management System"
version = "1.0.0"
id = "artifacts/dms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19176

[services.development]
run = "pnpm --filter @workspace/dms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dms", "run", "build" ]
publicDir = "artifacts/dms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19176"
BASE_PATH = "/"
